<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>スタレゾ タクティクスボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=RocknRoll+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e14;--panel:#11151d;--panel2:#161b24;--elev:#1c222d;--elev2:#232a36;
  --line:#28303d;--line2:#323b49;
  --tx:#eef1f6;--tx2:#aeb6c4;--tx3:#727d8e;
  --ac:#f0883e;--ac-h:#ff9d52;--ac-dim:#3a2a1c;--ac-line:#5a3a20;
  --blue:#4a9eff;--grn:#3fb950;--red:#f0533f;--red-h:#ff6552;
  --r:7px;--r-sm:5px;--r-lg:11px;
  --sh:0 4px 16px rgba(0,0,0,.35);--sh-lg:0 12px 40px rgba(0,0,0,.5);
  --t:.15s cubic-bezier(.4,0,.2,1);
  /* legacy aliases used by inline styles in JS-built nodes */
  --s1:#161b24;--s2:#1c222d;--s3:#28303d;--s4:#323b49;
}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP','Segoe UI',sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column;user-select:none;-webkit-font-smoothing:antialiased;font-size:13px}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px;border:2px solid var(--bg)}::-webkit-scrollbar-thumb:hover{background:var(--tx3)}

/* ═══ HEADER (.hd / .ha / .b) ═══ */
.hd{display:flex;align-items:center;gap:12px;padding:0 16px;height:50px;background:linear-gradient(180deg,var(--panel2),var(--panel));border-bottom:1px solid var(--line);flex-shrink:0;z-index:30;flex-wrap:nowrap}
.hd h1{font-size:14px;font-weight:600;white-space:nowrap;letter-spacing:.01em;display:flex;align-items:center;gap:8px}
.hd h1::before{display:none}
.hd h1 b{color:var(--ac);font-weight:600}
.sv{font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:5px}
.sv:not(:empty)::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--grn)}
.ha{display:flex;gap:4px;margin-left:auto;align-items:center;flex-wrap:wrap}
.b{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border:1px solid transparent;background:var(--elev);color:var(--tx2);border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;transition:all var(--t);font-family:inherit}
.b:hover{background:var(--elev2);color:var(--tx)}
.b:active{transform:translateY(1px)}
.b.p{background:var(--ac);color:#160d05;font-weight:600}.b.p:hover{background:var(--ac-h)}
.b.d{color:var(--red);background:transparent}.b.d:hover{background:var(--red);color:#fff}

/* ═══ TABS ═══ */
.tabs{display:flex;align-items:stretch;gap:0;padding:0 12px;height:38px;background:var(--panel);border-bottom:1px solid var(--line);overflow-x:auto;overflow-y:hidden;flex-shrink:0;z-index:20}
.tabs::-webkit-scrollbar{height:0}
.tab{display:flex;align-items:center;gap:7px;padding:0 16px;background:transparent;border:none;border-bottom:2px solid transparent;cursor:grab;font-size:12px;color:var(--tx3);white-space:nowrap;transition:color var(--t),background var(--t);position:relative;font-weight:500}
.tab:hover{color:var(--tx2);background:rgba(255,255,255,.02)}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.tab.active::before{content:'';position:absolute;inset:0 0 2px;background:linear-gradient(180deg,rgba(240,136,62,.06),transparent)}
.tab span{position:relative;z-index:1}
.tx{font-size:14px;line-height:1;opacity:.4;padding:2px;border-radius:3px;transition:all var(--t);position:relative;z-index:1}
.tx:hover{opacity:1;color:var(--red);background:rgba(240,83,63,.15)}
.ta{display:flex;align-items:center;justify-content:center;min-width:32px;padding:0 8px;cursor:pointer;color:var(--tx3);font-size:15px;background:transparent;border:none;transition:color var(--t)}
.ta:hover{color:var(--ac)}

/* ═══ MAIN ═══ */
.mn{display:flex;flex:1;overflow:hidden;min-height:0}
.sb,.rp{width:250px;background:var(--panel);flex-shrink:0;overflow-y:auto;overflow-x:hidden;padding:12px}
.sb{border-right:1px solid var(--line)}
.rp{border-left:1px solid var(--line)}

/* ═══ CARD ═══ */
.card{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-lg);margin-bottom:10px;overflow:hidden}
.card-h{display:flex;align-items:center;gap:7px;padding:9px 12px;font-size:10px;font-weight:700;color:var(--tx2);letter-spacing:.07em;border-bottom:1px solid var(--line);background:rgba(255,255,255,.015)}
.card-h svg{display:none}
.card-b{padding:11px 12px;display:flex;flex-direction:column;gap:9px}
.lblrow{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:-3px}
.divln{height:1px;background:var(--line);margin:2px 0}

/* tool/field buttons (.tr/.tb/.seg/.fb) */
.tr{display:flex;gap:4px}
.tb{flex:1;height:30px;padding:0 6px;border:1px solid var(--line2);background:var(--elev);color:var(--tx2);border-radius:var(--r-sm);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11.5px;white-space:nowrap;transition:all var(--t);font-family:inherit;font-weight:500}
.tb:hover{background:var(--elev2);color:var(--tx);border-color:var(--tx3)}
.tb.a{background:var(--ac);border-color:var(--ac);color:#160d05;font-weight:600}
.seg{display:flex;gap:3px;background:var(--bg);padding:3px;border-radius:var(--r);border:1px solid var(--line)}
.fb{flex:1;padding:7px 4px;border:none;background:transparent;color:var(--tx2);border-radius:var(--r-sm);cursor:pointer;font-size:11.5px;font-weight:500;transition:all var(--t);text-align:center;font-family:inherit}
.fb:hover{color:var(--tx);background:var(--elev)}
.fb.a{background:var(--ac);color:#160d05;font-weight:600}

/* AOE type list (.ao/.at/.dt/.aw) */
.ao{display:none;flex-direction:column;gap:3px}
.ao.show{display:flex}
.at{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid transparent;background:var(--bg);color:var(--tx2);border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:500;transition:all var(--t)}
.at:hover{background:var(--elev);color:var(--tx)}
.at.a{border-color:var(--ac-line);background:var(--ac-dim);color:var(--tx)}
.at .dt{width:16px;height:16px;border-radius:5px;flex-shrink:0}
.at.a .dt{box-shadow:0 0 0 2px rgba(240,136,62,.3)}
.aw{display:flex;align-items:center;gap:5px;padding-top:3px;font-size:11px;color:var(--tx2)}
.aw input{width:56px;padding:5px 6px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--r-sm);color:var(--tx);font-size:12px;text-align:center;font-weight:600}
.aw input:focus{outline:none;border-color:var(--ac)}

/* rows / sliders / inputs */
.rr{display:flex;align-items:center;gap:9px}
.rr.between{justify-content:space-between}
.lb{font-size:11px;color:var(--tx2);min-width:42px;flex-shrink:0}
input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--line2);border-radius:3px;outline:none;cursor:pointer;min-width:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--ac);cursor:grab;border:2px solid var(--panel2);box-shadow:0 1px 4px rgba(0,0,0,.4);transition:transform var(--t)}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--ac);cursor:grab;border:2px solid var(--panel2)}
.vd{font-size:11px;color:var(--tx);min-width:30px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.sw{width:34px;height:24px;border:1px solid var(--line2);border-radius:var(--r-sm);background:var(--elev);cursor:pointer;padding:2px;flex-shrink:0}
.sw::-webkit-color-swatch-wrapper{padding:0}.sw::-webkit-color-swatch{border:none;border-radius:3px}

/* color presets */
.cps{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.cpx{width:100%;aspect-ratio:1;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform var(--t),border-color var(--t);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.cpx:hover{transform:scale(1.18)}.cpx.a{border-color:#fff;box-shadow:0 0 0 1px var(--bg),0 0 8px rgba(255,255,255,.3)}

/* checkbox */
.chk{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--tx2);transition:color var(--t)}
.chk:hover{color:var(--tx)}
.chk input{width:16px;height:16px;accent-color:var(--ac);cursor:pointer}

/* grid divisions */
.go{display:none;align-items:center;gap:6px;font-size:11px;color:var(--tx2)}
.go.show,.go[style*="flex"]{display:flex}
.go input{width:54px;padding:5px 4px 5px 8px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--r-sm);color:var(--tx);font-size:12px;text-align:center;font-weight:600}
.go input:focus{outline:none;border-color:var(--ac)}

/* marker size rows */
.szr{display:flex;align-items:center;gap:7px;height:22px}
.szl{width:38px;flex-shrink:0;font-size:11px;color:var(--tx2);text-align:right}

/* marker source grids */
.mg{display:flex;flex-wrap:wrap;gap:5px}
.mg.nm{display:grid;grid-template-columns:repeat(3,34px);gap:5px}
.ms{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:grab;color:#fff;border:2px solid rgba(255,255,255,.25);transition:transform var(--t),box-shadow var(--t);box-shadow:0 2px 5px rgba(0,0,0,.3)}
.ms:hover{transform:scale(1.12);box-shadow:0 3px 10px rgba(0,0,0,.5)}
.ns{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;cursor:grab;border:2px solid rgba(0,0,0,.8);background:radial-gradient(circle at 38% 32%,#2a2a2a,#080808 75%);transition:transform var(--t);flex-shrink:0;font-family:'Reggae One','Arial Black',sans-serif;text-shadow:0 1px 3px rgba(0,0,0,.9)}
.ns:hover{transform:scale(1.12)}
.enemy-src{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;background:#c03050;color:#fff;border-radius:var(--r);cursor:grab;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.15);transition:all var(--t);box-shadow:0 2px 8px rgba(192,48,80,.3)}
.enemy-src svg{width:15px;height:15px}
.enemy-src:hover{background:#d13a5c;transform:translateY(-1px)}

/* ═══ CANVAS STAGE (.cw / .cc) ═══ */
.cw{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;background:radial-gradient(ellipse at 50% 40%,#0e131c 0%,var(--bg) 75%);position:relative;min-width:0}
.cw::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}
.cc{position:relative;flex-shrink:0;box-shadow:0 0 0 1px var(--line),0 16px 50px rgba(0,0,0,.55);border-radius:3px}
.cc canvas{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:3px}
#bgC{z-index:1}#aoC{z-index:2}#drC{z-index:3}#pvC{z-index:4;pointer-events:none}

/* placed items */
.pm{position:absolute;z-index:10;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:grab;transform:translate(-50%,-50%);border:2px solid rgba(255,255,255,.55);box-shadow:0 2px 8px rgba(0,0,0,.5),inset 0 1px 1px rgba(255,255,255,.2);color:#fff;letter-spacing:-.02em;transition:box-shadow var(--t)}
.pn{position:absolute;z-index:9;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;cursor:grab;transform:translate(-50%,-50%);border:2px solid rgba(0,0,0,.85);box-shadow:0 2px 8px rgba(0,0,0,.6);background:radial-gradient(circle at 38% 32%,#2a2a2a,#080808 75%);font-family:'Reggae One','Arial Black',sans-serif;text-shadow:0 1px 3px rgba(0,0,0,.9)}
.pe{position:absolute;z-index:10;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:grab;transform:translate(-50%,-50%);border:2px solid rgba(255,255,255,.35);box-shadow:0 2px 10px rgba(0,0,0,.5);color:#fff;background:#c03050;letter-spacing:-.02em;text-align:center;line-height:1.05;padding:2px}
.pm:hover,.pn:hover,.pe:hover{box-shadow:0 0 0 2px var(--blue),0 4px 14px rgba(0,0,0,.5)}
.pm:hover .xb,.pn:hover .xb,.pe:hover .xb,.ah:hover .xb,.ah.sel .xb{opacity:1;transform:scale(1)}
.xb{position:absolute;top:-7px;right:-7px;width:16px;height:16px;background:var(--red);border:1.5px solid var(--bg);border-radius:50%;color:#fff;font-size:9px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;pointer-events:auto;opacity:0;transform:scale(.6);transition:all var(--t);font-weight:700}
.xb:hover{background:var(--red-h)}
.msel{box-shadow:0 0 0 2px var(--blue),0 0 16px rgba(74,158,255,.5)!important}
.cc.drawmode .pm,.cc.drawmode .pn,.cc.drawmode .pe,.cc.drawmode .dh{pointer-events:none}
.cc.drawmode .pm .xb,.cc.drawmode .pn .xb,.cc.drawmode .pe .xb{pointer-events:none}
.cc.drawmode .ah,.cc.drawmode .ah .xb{pointer-events:auto}
.ah{position:absolute;z-index:8;cursor:grab;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;border:1.5px dashed rgba(240,136,62,.5);background:rgba(240,136,62,.08);opacity:.6;transition:opacity var(--t)}
.ah:hover{opacity:1}.ah.sel{opacity:.95;border-color:var(--blue);background:rgba(74,158,255,.1)}
.rh{position:absolute;z-index:15;width:9px;height:9px;background:#fff;border:1.5px solid var(--blue);transform:translate(-50%,-50%);cursor:nwse-resize;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.rh.side{cursor:ew-resize;background:var(--blue)}.rh.rot{width:11px;height:11px;border-radius:50%;background:var(--blue);border:2px solid #fff;cursor:grab}
.dh{position:absolute;z-index:14;width:9px;height:9px;background:var(--ac);border:1.5px solid #fff;transform:translate(-50%,-50%);cursor:nwse-resize;border-radius:2px;pointer-events:auto;box-shadow:0 1px 3px rgba(0,0,0,.4)}

/* ═══ MODALS (.mbg/.mdl/.mi/.ma/.slist/.sitem) ═══ */
.mbg{display:none;position:fixed;inset:0;background:rgba(5,7,11,.72);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px}.mbg.show{display:flex;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.mdl{background:var(--panel2);border:1px solid var(--line2);border-radius:var(--r-lg);padding:18px;width:440px;max-width:100%;max-height:84vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px;box-shadow:var(--sh-lg);animation:pop .22s cubic-bezier(.34,1.3,.5,1)}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:none}}
.mdl h2{font-size:14px;font-weight:600}
.mdl textarea{width:100%;height:130px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--r);color:var(--tx);padding:10px;font-size:11px;font-family:ui-monospace,monospace;resize:vertical;line-height:1.5}
.mdl textarea:focus{outline:none;border-color:var(--ac)}
.mi{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--r);color:var(--tx);font-size:14px;font-family:inherit}
.mi:focus{outline:none;border-color:var(--ac)}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.slist{display:flex;flex-direction:column;gap:5px;max-height:260px;overflow-y:auto}
.sitem{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r);cursor:pointer;transition:all var(--t)}
.sitem:hover{background:var(--elev);border-color:var(--line2)}
.sitem .sn{flex:1;font-size:13px;font-weight:500;color:var(--tx)}
.sitem .st{font-size:10px;color:var(--tx3)}
.sitem .sd{font-size:14px;opacity:.5;padding:3px;border-radius:4px;transition:all var(--t)}
.sitem .sd:hover{opacity:1;background:rgba(240,83,63,.15)}

/* toast */
.tst{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--elev2);color:var(--tx);padding:10px 20px;border-radius:var(--r);font-size:13px;z-index:200;opacity:0;transition:all .3s cubic-bezier(.34,1.3,.5,1);border:1px solid var(--line2);box-shadow:var(--sh-lg);font-weight:500}
.tst.show{opacity:1;transform:translateX(-50%) translateY(0)}



.layer-group{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--elev);border-radius:var(--r-sm);cursor:grab;font-size:10px;font-weight:700;color:var(--tx2);letter-spacing:.04em;margin-top:4px;transition:background var(--t)}
.layer-group:hover{background:var(--elev2)}
.layer-group.drag{opacity:.4}
.layer-group.drop-into{background:var(--ac-dim);border:1px solid var(--ac);box-shadow:inset 0 0 0 1px var(--ac)}
.layer-group .lg-arrow{font-size:8px;color:var(--tx3);width:10px;cursor:pointer}
.layer-group .lg-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.layer-group .lg-count{font-size:9px;color:var(--tx3);background:var(--bg);padding:1px 6px;border-radius:8px;font-weight:600}
.layer-group .lg-rename{cursor:pointer;opacity:.5;font-size:11px;padding:0 2px}
.layer-group .lg-rename:hover{opacity:1;color:var(--ac)}
.layer-group .lg-ungroup{cursor:pointer;opacity:.5;font-size:12px;padding:0 2px}
.layer-group .lg-ungroup:hover{opacity:1;color:var(--ac)}
.layer-item.in-group{margin-left:14px;border-left:2px solid var(--line2)}
.layer-list{display:flex;flex-direction:column;gap:3px;max-height:300px;overflow-y:auto}
.layer-item{display:flex;align-items:center;gap:7px;padding:8px 8px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);cursor:grab;font-size:11px;color:var(--tx2);transition:all var(--t)}
.layer-item:hover{background:var(--elev);border-color:var(--line2)}
.layer-item.sel{border-color:var(--blue);background:rgba(74,158,255,.08)}
.layer-item.drag{opacity:.4}
.layer-item .li-ico{width:20px;height:20px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.layer-item .li-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.layer-item .li-vis{cursor:pointer;opacity:.6;font-size:13px;padding:2px;flex-shrink:0}
.layer-item .li-vis:hover{opacity:1}
.layer-item .li-out{cursor:pointer;opacity:.5;font-size:12px;padding:2px;flex-shrink:0;color:var(--ac)}
.layer-item .li-out:hover{opacity:1}
.layer-item .li-del{cursor:pointer;opacity:.4;font-size:13px;padding:2px;flex-shrink:0;color:var(--red)}
.layer-item .li-del:hover{opacity:1}
.layer-empty{font-size:10.5px;color:var(--tx3);text-align:center;padding:14px}

.pm,.pn,.pe{color:transparent!important;background:transparent!important;border-color:transparent!important;box-shadow:none!important;text-shadow:none!important}
.pm.msel,.pn.msel,.pe.msel{box-shadow:0 0 0 2px var(--blue),0 0 16px rgba(74,158,255,.5)!important;border-color:rgba(74,158,255,.7)!important}
.pn{background:transparent!important}
.hidden{display:none!important}
@media(max-width:1100px){.sb,.rp{width:210px}}
@media(max-width:820px){.sb,.rp{width:180px}.hd h1 span{display:none}}
</style>
</head>
<body>
<body>

<div class="hd"><h1><b>スタレゾ</b> タクティクスボード</h1><span class="sv" id="svM"></span>
<div class="ha">
<button class="b" onclick="undo()">←</button><button class="b" onclick="redo()">→</button>
<button class="b" onclick="clearDraw()">描画クリア</button>
<button class="b" onclick="clearAoE()">AoEクリア</button>
<button class="b" onclick="clearMarkers()">マーカークリア</button>
<button class="b d" onclick="clearAll()">全クリア</button>
<button class="b p" onclick="openSaveM()">セーブ</button>
<button class="b" onclick="openLoadM()">ロード</button>
<button class="b" onclick="openShareM()">共有</button>
<button class="b" onclick="openImportM()">読込</button>
<button class="b" onclick="exportImg()">画像保存</button>

<script>


const $=id=>document.getElementById(id);
function darkenColor(hex,amt){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.max(0,r-amt);g=Math.max(0,g-amt);b=Math.max(0,b-amt);return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}
const COLS=['#ffffff','#f85149','#58a6ff','#3fb950','#d29922','#d2a8ff','#f778ba','#ff6a00'];
const RTYPES=[{p:'T',c:'#2f81f7'},{p:'H',c:'#3fb950'},{p:'D',c:'#f85149'},{p:'PT',c:'#d29922'}];
let CW=600,CH=600,mapSz=600,field='circle',tool='select',dC='#ffffff',bSz=3;
let showN=false,showGrid=true,aoeT='normal',aoeLW=60,gridC=3,gridR=3;
let roleSz=50,enemySz=50,numSz=50,bgColor='#151922';
let drawings=[],roles=[],nums=[],enemies=[],aoes=[],gridFills=[],hist=[],redoH=[];
let fillOn=false,fillC='#ffffff',textFont='sans-serif',textSize=28,textColor='#ffffff';
let layerGroupsArr=[];let layerOrder=[];let multiSel=[];let aoeClickCandidate=null,aoeClickStart=null;
const NUMCOL={1:'#ffd92e',2:'#ff7a2e',3:'#a6e22e',4:'#3ad6c5',5:'#a06cff',6:'#4a9eff'};
let drawing=false,lx,ly,ss=null,tpend=null,epend=null,uid=0,curDraw=null,selDraw=null;
let selAoe=null,selMk=null;const nid=()=>'_'+(++uid);
// TABS
let tabs=[{id:'t0',name:'Tab 1'}],curTab='t0';
function getTabData(){return{field,gridC,gridR,showGrid,showN,roleSz,enemySz,numSz,bgColor,layerGroupsArr:JSON.parse(JSON.stringify(layerGroupsArr)),layerOrder:layerOrder.slice(),drawings:JSON.parse(JSON.stringify(drawings)),aoes:JSON.parse(JSON.stringify(aoes)),roles:JSON.parse(JSON.stringify(roles)),nums:JSON.parse(JSON.stringify(nums)),enemies:JSON.parse(JSON.stringify(enemies)),gridFills:JSON.parse(JSON.stringify(gridFills))}}
function setTabData(d){if(!d)return;field=d.field||'circle';gridC=d.gridC||3;gridR=d.gridR||3;showGrid=d.showGrid!==false;showN=!!d.showN;roleSz=d.roleSz||50;enemySz=d.enemySz||50;numSz=d.numSz||50;bgColor=d.bgColor||'#151922';drawings=d.drawings||[];aoes=d.aoes||[];roles=d.roles||[];nums=d.nums||[];enemies=d.enemies||[];gridFills=d.gridFills||[];hist=[];redoH=[];document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('a',b.dataset.f===field));$('gO').style.display=(field==='square'||field==='blank')?'flex':'none';$('gC').value=gridC;$('gR').value=gridR;$('gridChk').checked=showGrid;if($('nBtn'))$('nBtn').classList.toggle('a',showN);if($('nBtnChk'))$('nBtnChk').checked=showN;$('roleSz').value=roleSz;$('rsV').textContent=roleSz;$('enemySz').value=enemySz;$('esV').textContent=enemySz;$('numSz').value=numSz;$('nsV').textContent=numSz;if($('bgCol'))$('bgCol').value=bgColor}
function saveTab(){const t=tabs.find(x=>x.id===curTab);if(t)t.data=getTabData()}
function loadTab(id){if(curTab)saveTab();curTab=id;const t=tabs.find(x=>x.id===id);setTabData(t.data||{});calcSz();drawBg();rebuildDOM();renderDr();renderAoE();rebuildAH();renderTabs();renderLayers();setTimeout(fitCanvas,50);schedSave()}
function addTab(){saveTab();const id=nid();tabs.push({id,name:'Tab '+(tabs.length+1)});loadTab(id)}
function copyTab(){saveTab();const s=tabs.find(x=>x.id===curTab);if(!s)return;const id=nid();tabs.push({id,name:s.name+'コピー',data:JSON.parse(JSON.stringify(s.data))});loadTab(id)}
function delTab(id){if(tabs.length<=1)return;const t=tabs.find(x=>x.id===id);if(!t)return;$('confirmTitle').textContent='タブの削除';$('confirmMsg').textContent='「'+t.name+'」を削除しますか？この操作は元に戻せません。';const ok=$('confirmOk');const h=()=>{tabs=tabs.filter(x=>x.id!==id);if(curTab===id)loadTab(tabs[0].id);else renderTabs();schedSave();closeM('confirmM')};ok.onclick=h;openM('confirmM')}
function renameTab(id){const t=tabs.find(x=>x.id===id);if(!t)return;const inp=$('renameInput');inp.value=t.name;$('renameOk').onclick=()=>{const v=inp.value.trim();if(v){t.name=v;renderTabs();schedSave()}closeM('renameM')};openM('renameM');setTimeout(()=>{inp.focus();inp.select()},100);inp.onkeydown=e=>{if(e.key==='Enter')$('renameOk').click()}}
let dragTabId=null;

// ═══ UNIFIED LAYER SYSTEM (free ordering + custom groups) ═══
let layerDragId=null;            // id of object or 'grp:xxx'
let layerCollapsedGroups={};     // groupId -> bool

function allObjs(){
  // returns map id -> {kind,obj,label,color,ico}
  const m={};
  const dn={brush:'ブラシ',line:'直線',arrow:'矢印',rect:'四角',ellipse:'円',text:'文字'};
  const an={normal:'範囲攻撃',stack:'頭割り',tb:'タンク強',decay:'距離減衰'};
  enemies.forEach(o=>m[o.id]={kind:'enemy',obj:o,label:o.l||'敵',color:o.c||'#c03050',ico:'敵'});
  roles.forEach(o=>m[o.id]={kind:'role',obj:o,label:o.l,color:o.c,ico:o.l[0]});
  nums.forEach(o=>m[o.id]={kind:'num',obj:o,label:'番号 '+o.l,color:(typeof NUMCOL!=='undefined'&&NUMCOL[o.l])||'#888',ico:o.l});
  drawings.forEach(o=>m[o.id]={kind:'draw',obj:o,label:o.tp==='text'?('文字: '+(o.txt||'')):(dn[o.tp]||'描画'),color:o.c||'#888',ico:'✎'});
  aoes.forEach(o=>m[o.id]={kind:'aoe',obj:o,label:an[o.at]||o.at,color:'#e08020',ico:'◎'});
  return m;
}
function syncOrder(){
  const m=allObjs();const ids=Object.keys(m);
  // clean group members of dead ids
  layerGroupsArr.forEach(g=>{g.members=g.members.filter(id=>m[id])});
  // ensure each group has an anchor token in layerOrder
  layerGroupsArr.forEach(g=>{const tok='grp:'+g.id;if(!layerOrder.includes(tok))layerOrder.unshift(tok)});
  // remove anchors for dead groups
  layerOrder=layerOrder.filter(id=>{if(id.startsWith&&id.startsWith('grp:')){return layerGroupsArr.some(g=>'grp:'+g.id===id)}return m[id]});
  // add new object ids to top
  ids.forEach(id=>{if(!layerOrder.includes(id))layerOrder.unshift(id)});
}

function groupOf(id){return layerGroupsArr.find(g=>g.members.includes(id))}
function applyZ(){
  // Visual order is handled by renderDr() reading layerOrder.
  // DOM markers are transparent interaction proxies; keep them clickable on top.
  renderDr();
}

function wireLayerContainer(){
  const box=$('layerList');if(!box||box._wired)return;box._wired=true;
  box.addEventListener('dragover',e=>{e.preventDefault();
    const items=box.querySelectorAll('.layer-item,.layer-group');
    if(!items.length)return;
    const first=items[0];const fr=first.getBoundingClientRect();
    const last=items[items.length-1];const lr=last.getBoundingClientRect();
    if(e.clientY<fr.top+fr.height/4){clearDropMarks();first.style.borderTop='2px solid var(--ac)'}
    else if(e.clientY>lr.bottom){clearDropMarks();last.style.borderBottom='2px solid var(--ac)'}
  });
  box.addEventListener('drop',e=>{
    const items=box.querySelectorAll('.layer-item,.layer-group');
    if(!items.length||!layerDragId)return;
    const first=items[0];const fr=first.getBoundingClientRect();
    const last=items[items.length-1];const lr=last.getBoundingClientRect();
    const atTop=e.clientY<fr.top+fr.height/4;
    const atBottom=e.clientY>lr.bottom;
    if(!atTop&&!atBottom)return;
    e.preventDefault();clearDropMarks();
    if(layerDragId.startsWith('grp:')){
      const gid=layerDragId.slice(4);const g=layerGroupsArr.find(x=>x.id===gid);if(!g)return;
      const tok='grp:'+gid;const block=[tok,...g.members.filter(id=>layerOrder.includes(id))];
      layerOrder=layerOrder.filter(id=>!block.includes(id));
      if(atTop)layerOrder.unshift(...block);else layerOrder.push(...block);
    }else{
      const og=groupOf(layerDragId);if(og)og.members=og.members.filter(x=>x!==layerDragId);
      layerOrder=layerOrder.filter(id=>id!==layerDragId);
      if(atTop)layerOrder.unshift(layerDragId);else layerOrder.push(layerDragId);
    }
    applyZ();redrawAll();renderLayers();schedSave();
  });
}

function renderLayers(){
  const box=$('layerList');if(!box)return;syncOrder();wireLayerContainer();box.innerHTML='';
  const m=allObjs();
  const hasContent=layerOrder.some(id=>m[id])||layerGroupsArr.length;
  if(!hasContent){box.innerHTML='<div class="layer-empty">まだ何も配置されていません</div>';return}
  layerOrder.forEach(id=>{
    if(id.startsWith&&id.startsWith('grp:')){
      const g=layerGroupsArr.find(x=>'grp:'+x.id===id);if(!g)return;
      box.appendChild(groupHeadEl(g,m));
      if(!layerCollapsedGroups[g.id]){g.members.forEach(mid=>{if(m[mid])box.appendChild(itemEl(mid,m,true))})}
      return;
    }
    const info=m[id];if(!info)return;
    if(groupOf(id))return; // members rendered under their group anchor
    box.appendChild(itemEl(id,m,false));
  });
}

function groupHeadEl(g,m){
  const head=document.createElement('div');head.className='layer-group';head.draggable=true;head.dataset.gid=g.id;
  const arrow=document.createElement('span');arrow.className='lg-arrow';arrow.textContent=layerCollapsedGroups[g.id]?'▶':'▼';
  const nm=document.createElement('span');nm.className='lg-name';nm.textContent=g.name;nm.title='クリックで全選択 / ダブルクリックまたは✎で名前変更';
  const cnt=document.createElement('span');cnt.className='lg-count';cnt.textContent=g.members.length;
  const ren=document.createElement('span');ren.className='lg-rename';ren.textContent='✎';ren.title='名前変更';
  ren.onclick=e=>{e.stopPropagation();renameGroup(g.id)};
  const ung=document.createElement('span');ung.className='lg-ungroup';ung.textContent='⊟';ung.title='グループ解除';
  ung.onclick=e=>{e.stopPropagation();ungroup(g.id)};
  head.appendChild(arrow);head.appendChild(nm);head.appendChild(cnt);head.appendChild(ren);head.appendChild(ung);
  arrow.onclick=e=>{e.stopPropagation();layerCollapsedGroups[g.id]=!layerCollapsedGroups[g.id];renderLayers()};
  let clickT=null;
  head.onclick=e=>{if(clickT){clearTimeout(clickT);clickT=null;return}clickT=setTimeout(()=>{clickT=null;selectGroup(g)},220)};
  nm.ondblclick=e=>{e.stopPropagation();if(clickT){clearTimeout(clickT);clickT=null}renameGroup(g.id)};
  head.ondblclick=e=>{if(clickT){clearTimeout(clickT);clickT=null}};
  // drag group to reorder whole group
  head.addEventListener('dragstart',e=>{layerDragId='grp:'+g.id;e.dataTransfer.effectAllowed='move';head.classList.add('drag')});
  head.addEventListener('dragend',()=>{head.classList.remove('drag');layerDragId=null;clearDropMarks()});
  head.addEventListener('dragover',e=>{e.preventDefault();clearDropMarks();
    if(layerDragId&&layerDragId.startsWith('grp:')){return} // groups don't drop into groups
    head.classList.add('drop-into')}); // highlight = enter group
  head.addEventListener('dragleave',()=>{head.classList.remove('drop-into')});
  head.addEventListener('drop',e=>{e.preventDefault();head.classList.remove('drop-into');
    if(layerDragId&&layerDragId.startsWith('grp:'))return; // can't drop group into group
    onLayerDrop(null,head,e,g)});
  return head;
}
function itemEl(id,m,inGroup){
  const info=m[id];const el=document.createElement('div');
  el.className='layer-item'+(inGroup?' in-group':'')+((selDraw===id||selMk===id||selAoe===id||multiSel.includes(id))?' sel':'');
  el.draggable=true;el.dataset.id=id;
  const ico=document.createElement('div');ico.className='li-ico';ico.style.background=info.color;ico.textContent=info.ico;
  if(info.kind==='num'){ico.style.color=info.color;ico.style.background='#111'}
  const nm=document.createElement('div');nm.className='li-name';nm.textContent=info.label;
  const vis=document.createElement('span');vis.className='li-vis';vis.textContent=info.obj.hidden?'🚫':'👁';
  vis.onclick=e=>{e.stopPropagation();info.obj.hidden=!info.obj.hidden;redrawAll();renderLayers();schedSave()};
  const del=document.createElement('span');del.className='li-del';del.textContent='×';

gridFills.forEach(f=>{if(f.ring!==undefined){const ir=f.ring===0?0:r*.5,or2=f.ring===0?r*.5:r,sa=f.quad*Math.PI/2-Math.PI/2,ea=sa+Math.PI/2;bgX.fillStyle=f.co+'88';bgX.beginPath();bgX.arc(cx,cy,or2,sa,ea);bgX.arc(cx,cy,ir,ea,sa,true);bgX.closePath();bgX.fill()}});
bgX.strokeStyle='#3a4555';bgX.lineWidth=2;bgX.beginPath();bgX.arc(cx,cy,r,0,Math.PI*2);bgX.stroke();if(showGrid){bgX.strokeStyle='#2a3444';bgX.lineWidth=1;bgX.beginPath();bgX.arc(cx,cy,r*.5,0,Math.PI*2);bgX.stroke();bgX.beginPath();bgX.moveTo(cx,cy-r);bgX.lineTo(cx,cy+r);bgX.moveTo(cx-r,cy);bgX.lineTo(cx+r,cy);bgX.stroke()}bgX.fillStyle='#3a4555';bgX.beginPath();bgX.arc(cx,cy,3,0,Math.PI*2);bgX.fill()}else if(field==='square'){const p=20,fx=p,fy=p,fw=CW-p*2,fh=CH-p*2;bgX.fillStyle=bgColor;bgX.fillRect(fx,fy,fw,fh);bgX.strokeStyle='#3a4555';bgX.lineWidth=2;bgX.strokeRect(fx,fy,fw,fh);const cw=fw/gridC,ch=fh/gridR;gridFills.forEach(f=>{if(f.gc<gridC&&f.gr<gridR){bgX.fillStyle=f.co+'88';bgX.fillRect(fx+cw*f.gc,fy+ch*f.gr,cw,ch)}});if(showGrid){bgX.strokeStyle='#2a3444';bgX.lineWidth=1;for(let i=1;i<gridC;i++){bgX.beginPath();bgX.moveTo(fx+cw*i,fy);bgX.lineTo(fx+cw*i,fy+fh);bgX.stroke()}for(let i=1;i<gridR;i++){bgX.beginPath();bgX.moveTo(fx,fy+ch*i);bgX.lineTo(fx+fw,fy+ch*i);bgX.stroke()}}}if(showN){bgX.fillStyle='#58a6ff';bgX.font='bold 16px sans-serif';bgX.textAlign='center';bgX.fillText('N',CW/2,22)}}

function drawBBox(d){let x1,y1,x2,y2;
if(d.tp==='brush'&&d.pts.length){let a=Infinity,b=Infinity,c=-Infinity,e=-Infinity;d.pts.forEach(p=>{if(p.x<a)a=p.x;if(p.y<b)b=p.y;if(p.x>c)c=p.x;if(p.y>e)e=p.y});x1=a;y1=b;x2=c;y2=e}
else if(d.tp==='text'){const tx=d.x1,ty=d.y1,tw=(d.fs*d.txt.length*.32)/CW*100,th=(d.fs*.6)/CH*100;x1=tx-tw;y1=ty-th;x2=tx+tw;y2=ty+th}
else{x1=Math.min(d.x1,d.x2);y1=Math.min(d.y1,d.y2);x2=Math.max(d.x1,d.x2);y2=Math.max(d.y1,d.y2)}
return{x1,y1,x2,y2}}

else if(d.tp==='brush'&&d.pts.length>1){let a=Infinity,b=Infinity,c=-Infinity,e2=-Infinity;d.pts.forEach(p=>{if(p.x<a)a=p.x;if(p.y<b)b=p.y;if(p.x>c)c=p.x;if(p.y>e2)e2=p.y});if(c-a>.5&&e2-b>.5){mkDH(a,b,'draw_scale',d.id,0);mkDH(c,b,'draw_scale',d.id,1);mkDH(c,e2,'draw_scale',d.id,2);mkDH(a,e2,'draw_scale',d.id,3)}}

function getState(){return{drawings:JSON.parse(JSON.stringify(drawings)),aoes:JSON.parse(JSON.stringify(aoes)),roles:JSON.parse(JSON.stringify(roles)),nums:JSON.parse(JSON.stringify(nums)),enemies:JSON.parse(JSON.stringify(enemies)),gridFills:JSON.parse(JSON.stringify(gridFills))}}
function pushH(){hist.push(getState());redoH=[];if(hist.length>30)hist.shift()}
function undo(){if(!hist.length)return;redoH.push(getState());if(redoH.length>30)redoH.shift();const s=hist.pop();drawings=s.drawings;aoes=s.aoes;roles=s.roles;nums=s.nums;enemies=s.enemies;gridFills=s.gridFills||[];rebuildDOM();renderDr();renderAoE();rebuildAH();drawBg();schedSave();renderLayers()}
function redo(){if(!redoH.length)return;hist.push(getState());const s=redoH.pop();drawings=s.drawings;aoes=s.aoes;roles=s.roles;nums=s.nums;enemies=s.enemies;gridFills=s.gridFills||[];rebuildDOM();renderDr();renderAoE();rebuildAH();drawBg();schedSave();renderLayers()}

function drawMarkerCanvas(ctx,kind,m){
  const px=m.x/100*CW,py=m.y/100*CH;
  if(kind==='role'){const rs=roleSz;ctx.save();ctx.fillStyle=m.c;ctx.beginPath();ctx.arc(px,py,rs/2,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(8,rs/3)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(m.l,px,py+rs*0.08);ctx.restore()}
  else if(kind==='enemy'){const es=enemySz;ctx.save();ctx.fillStyle=m.c||'#c03050';ctx.beginPath();ctx.arc(px,py,es/2,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(8,es/4)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(m.l,px,py+es*0.04);ctx.restore()}
  else if(kind==='num'){const ns=numSz,rad=ns/2;ctx.save();const g=ctx.createRadialGradient(px-rad*.25,py-rad*.3,rad*.1,px,py,rad);g.addColorStop(0,'#2a2a2a');g.addColorStop(1,'#080808');ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,rad,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(0,0,0,.85)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=NUMCOL[m.l]||'#fff';ctx.font=`${Math.max(10,ns*.62)}px 'Reggae One','Arial Black',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(m.l,px,py+ns*0.06);ctx.restore()}
}
function drawMultiHL(info){const M=Math.max(CW,CH);drX.save();drX.strokeStyle='#60b0ff';drX.lineWidth=2;drX.setLineDash([5,3]);
const o=info.obj;
if(info.kind==='role'){drX.beginPath();drX.arc(o.x/100*CW,o.y/100*CH,roleSz/2+3,0,Math.PI*2);drX.stroke()}
else if(info.kind==='enemy'){drX.beginPath();drX.arc(o.x/100*CW,o.y/100*CH,enemySz/2+3,0,Math.PI*2);drX.stroke()}
else if(info.kind==='num'){drX.beginPath();drX.arc(o.x/100*CW,o.y/100*CH,numSz/2+3,0,Math.PI*2);drX.stroke()}
else if(info.kind==='aoe'){if(o.sh==='c'){drX.beginPath();drX.arc(o.cx/100*CW,o.cy/100*CH,o.r/100*M+4,0,Math.PI*2);drX.stroke()}else{drX.beginPath();drX.moveTo(o.x1/100*CW,o.y1/100*CH);drX.lineTo(o.x2/100*CW,o.y2/100*CH);drX.stroke()}}
else if(info.kind==='draw'){let x1,y1,x2,y2;if(o.tp==='brush'&&o.pts.length){let a=1e9,b=1e9,c=-1e9,e=-1e9;o.pts.forEach(p=>{if(p.x<a)a=p.x;if(p.y<b)b=p.y;if(p.x>c)c=p.x;if(p.y>e)e=p.y});x1=a;y1=b;x2=c;y2=e}else if(o.tp==='text'){const tw=(o.fs*o.txt.length*.32)/CW*100,th=(o.fs*.6)/CH*100;x1=o.x1-tw;y1=o.y1-th;x2=o.x1+tw;y2=o.y1+th}else{x1=Math.min(o.x1,o.x2);y1=Math.min(o.y1,o.y2);x2=Math.max(o.x1,o.x2);y2=Math.max(o.y1,o.y2)}drX.strokeRect(x1/100*CW-2,y1/100*CH-2,(x2-x1)/100*CW+4,(y2-y1)/100*CH+4)}
drX.restore()}
// OBJECT-BASED DRAWING
function renderDr(){drX.clearRect(0,0,CW,CH);aoX.clearRect(0,0,CW,CH);const M=Math.max(CW,CH);
const m=(typeof allObjs==='function')?allObjs():null;
if(typeof syncOrder==='function')syncOrder();
function paint(id){
  if(id&&id.startsWith&&id.startsWith('grp:'))return;
  let info=m?m[id]:null;
  if(!info){return}
  if(info.obj.hidden)return;
  if(info.kind==='draw'){drawObj(drX,info.obj);if(selDraw===id)drawSelBox(drX,info.obj)}
  else if(info.kind==='aoe'){const a=info.obj;if(a.sh==='c'){const cx=a.cx/100*CW,cy=a.cy/100*CH,r=a.r/100*M;drawAoES(drX,'c',a.at,{x:cx,y:cy},{x:cx+r,y:cy},0);if(selAoe===id){drX.save();drX.strokeStyle='#60b0ff';drX.lineWidth=2;drX.setLineDash([6,4]);drX.beginPath();drX.arc(cx,cy,r+4,0,Math.PI*2);drX.stroke();drX.restore()}}else{drawAoES(drX,'l',a.at,{x:a.x1/100*CW,y:a.y1/100*CH},{x:a.x2/100*CW,y:a.y2/100*CH},a.w/100*M);if(selAoe===id){drX.save();drX.strokeStyle='#60b0ff';drX.lineWidth=2;drX.setLineDash([6,4]);drX.beginPath();drX.moveTo(a.x1/100*CW,a.y1/100*CH);drX.lineTo(a.x2/100*CW,a.y2/100*CH);drX.stroke();drX.restore()}}}
  else{drawMarkerCanvas(drX,info.kind,info.obj)}
  if(typeof multiSel!=='undefined'&&multiSel.includes(id)){drawMultiHL(info)}
}
if(m&&typeof layerOrder!=='undefined'&&layerOrder.length){
  for(let i=layerOrder.length-1;i>=0;i--)paint(layerOrder[i]);
}else if(m){
  // fallback: paint all objects in a sensible default order (aoe, draw, markers)
  aoes.forEach(a=>{if(a.hidden)return;if(a.sh==='c'){const cx=a.cx/100*CW,cy=a.cy/100*CH,r=a.r/100*M;drawAoES(drX,'c',a.at,{x:cx,y:cy},{x:cx+r,y:cy},0)}else{drawAoES(drX,'l',a.at,{x:a.x1/100*CW,y:a.y1/100*CH},{x:a.x2/100*CW,y:a.y2/100*CH},a.w/100*M)}});
  drawings.forEach(d=>{if(d.hidden)return;drawObj(drX,d);if(selDraw===d.id)drawSelBox(drX,d)});
  enemies.forEach(o=>{if(!o.hidden)drawMarkerCanvas(drX,'enemy',o)});
  roles.forEach(o=>{if(!o.hidden)drawMarkerCanvas(drX,'role',o)});
  nums.forEach(o=>{if(!o.hidden)drawMarkerCanvas(drX,'num',o)});
}else{
  drawings.forEach(d=>{if(d.hidden)return;drawObj(drX,d);if(selDraw===d.id)drawSelBox(drX,d)});
}
}
function drawSelBox(ctx,d){ctx.save();ctx.strokeStyle='#60b0ff';ctx.lineWidth=1;ctx.setLineDash([4,3]);let x1,y1,x2,y2;
if(d.tp==='brush'&&d.pts.length){let mnx=Infinity,mny=Infinity,mxx=-Infinity,mxy=-Infinity;d.pts.forEach(p=>{const px=p.x/100*CW,py=p.y/100*CH;if(px<mnx)mnx=px;if(py<mny)mny=py;if(px>mxx)mxx=px;if(py>mxy)mxy=py});x1=mnx;y1=mny;x2=mxx;y2=mxy}
else if(d.tp==='text'){const tx=d.x1/100*CW,ty=d.y1/100*CH,tw=d.fs*d.txt.length*.35;x1=tx-tw;y1=ty-d.fs*.5;x2=tx+tw;y2=ty+d.fs*.5}
else{x1=Math.min(d.x1,d.x2)/100*CW;y1=Math.min(d.y1,d.y2)/100*CH;x2=Math.max(d.x1,d.x2)/100*CW;y2=Math.max(d.y1,d.y2)/100*CH}
const pad=4;ctx.strokeRect(x1-pad,y1-pad,x2-x1+pad*2,y2-y1+pad*2);ctx.setLineDash([]);ctx.restore()}
function drawObj(ctx,d){ctx.save();ctx.strokeStyle=d.c;ctx.fillStyle=d.c;ctx.lineWidth=d.lw;ctx.lineCap='round';ctx.lineJoin='round';
if(d.tp==='brush'&&d.pts.length>1){ctx.beginPath();ctx.moveTo(d.pts[0].x/100*CW,d.pts[0].y/100*CH);for(let i=1;i<d.pts.length;i++)ctx.lineTo(d.pts[i].x/100*CW,d.pts[i].y/100*CH);ctx.stroke()}
else if(d.tp==='line'){ctx.beginPath();ctx.moveTo(d.x1/100*CW,d.y1/100*CH);ctx.lineTo(d.x2/100*CW,d.y2/100*CH);ctx.stroke()}
else if(d.tp==='arrow'){const x1=d.x1/100*CW,y1=d.y1/100*CH,x2=d.x2/100*CW,y2=d.y2/100*CH;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();const a=Math.atan2(y2-y1,x2-x1),h=14;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-h*Math.cos(a-.52),y2-h*Math.sin(a-.52));ctx.moveTo(x2,y2);ctx.lineTo(x2-h*Math.cos(a+.52),y2-h*Math.sin(a+.52));ctx.stroke()}
else if(d.tp==='rect'){if(d.fl){ctx.fillStyle=d.fc;ctx.fillRect(d.x1/100*CW,d.y1/100*CH,(d.x2-d.x1)/100*CW,(d.y2-d.y1)/100*CH)}ctx.strokeRect(d.x1/100*CW,d.y1/100*CH,(d.x2-d.x1)/100*CW,(d.y2-d.y1)/100*CH)}
else if(d.tp==='ellipse'){const cx=(d.x1+d.x2)/2/100*CW,cy=(d.y1+d.y2)/2/100*CH,rx=Math.abs(d.x2-d.x1)/2/100*CW,ry=Math.abs(d.y2-d.y1)/2/100*CH;ctx.beginPath();ctx.ellipse(cx,cy,Math.max(1,rx),Math.max(1,ry),0,0,Math.PI*2);if(d.fl){ctx.fillStyle=d.fc;ctx.fill()}ctx.stroke()}
else if(d.tp==='text'){ctx.font=`bold ${d.fs}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(d.txt,d.x1/100*CW,d.y1/100*CH)}
ctx.restore()}
function hitDraw(px,py,thr){// px,py in canvas coords, returns drawing id or null
for(let i=drawings.length-1;i>=0;i--){const d=drawings[i];if(d.tp==='brush'){for(let j=1;j<d.pts.length;j++){if(distToSeg(px,py,d.pts[j-1].x/100*CW,d.pts[j-1].y/100*CH,d.pts[j].x/100*CW,d.pts[j].y/100*CH)<thr+d.lw/2)return d.id}}
else if(d.tp==='line'||d.tp==='arrow'){if(distToSeg(px,py,d.x1/100*CW,d.y1/100*CH,d.x2/100*CW,d.y2/100*CH)<thr+d.lw/2)return d.id}
else if(d.tp==='rect'){const x1r=Math.min(d.x1,d.x2)/100*CW,y1r=Math.min(d.y1,d.y2)/100*CH,x2r=Math.max(d.x1,d.x2)/100*CW,y2r=Math.max(d.y1,d.y2)/100*CH;if(px>=x1r-thr&&px<=x2r+thr&&py>=y1r-thr&&py<=y2r+thr)return d.id}
else if(d.tp==='ellipse'){const cx=(d.x1+d.x2)/2/100*CW,cy=(d.y1+d.y2)/2/100*CH,rx=Math.abs(d.x2-d.x1)/2/100*CW,ry=Math.abs(d.y2-d.y1)/2/100*CH;if(rx>0&&ry>0){const v=Math.pow((px-cx)/(rx||1),2)+Math.pow((py-cy)/(ry||1),2);if(v<=1.2+thr/Math.max(rx,ry,1))return d.id}}
else if(d.tp==='text'){const tx=d.x1/100*CW,ty=d.y1/100*CH;if(Math.abs(px-tx)<d.fs*d.txt.length*.35&&Math.abs(py-ty)<d.fs*.6)return d.id}}return null}
function distToSeg(px,py,x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;if(l2===0)return Math.hypot(px-x1,py-y1);let t=((px-x1)*dx+(py-y1)*dy)/l2;t=Math.max(0,Math.min(1,t));return Math.hypot(px-(x1+t*dx),py-(y1+t*dy))}

function deselAoe(){selAoe=null;cc.querySelectorAll('.rh').forEach(e=>e.remove());cc.querySelectorAll('.ah').forEach(e=>e.classList.remove('sel'))}
function updateSel(){cc.querySelectorAll('.rh').forEach(e=>e.remove());if(!selAoe)return;const a=aoes.find(x=>x.id===selAoe);if(!a)return;const M=Math.max(CW,CH);if(a.sh==='c'){mkH(a.cx/100*CW+a.r/100*M,a.cy/100*CH,'circ_resize',a.id,'nwse-resize')}else{const x1=a.x1/100*CW,y1=a.y1/100*CH,x2=a.x2/100*CW,y2=a.y2/100*CH,w=a.w/100*M,dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);if(len<1)return;const nx=-dy/len,ny=dx/len,hw=w/2;[[x1+nx*hw,y1+ny*hw],[x2+nx*hw,y2+ny*hw],[x2-nx*hw,y2-ny*hw],[x1-nx*hw,y1-ny*hw]].forEach(([px,py])=>mkH(px,py,'line_corner',a.id,'nwse-resize'));const mx=(x1+x2)/2,my=(y1+y2)/2;[[mx+nx*hw,my+ny*hw],[mx-nx*hw,my-ny*hw]].forEach(([px,py])=>mkH(px,py,'line_side',a.id,'ew-resize','side'));mkH(mx+nx*(hw+25),my+ny*(hw+25),'line_rot',a.id,'grab','rot')}}
function mkH(px,py,kind,aoeId,cursor,cls){const el=document.createElement('div');el.className='rh'+(cls?' '+cls:'');el.style.left=px/CW*100+'%';el.style.top=py/CH*100+'%';el.style.cursor=cursor;const pos={id:aoeId,x:px/CW*100,y:py/CH*100};el.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();pushH();startDr(el,pos,kind,e.clientX,e.clientY)});el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();pushH();startDr(el,pos,kind,e.touches[0].clientX,e.touches[0].clientY)},{passive:false});cc.appendChild(el)}
function clearAoE(){pushH();aoes=[];selAoe=null;renderAoE();rebuildAH();renderLayers();schedSave()}
function clearMarkers(){pushH();const mids=[...roles,...nums,...enemies].map(m=>m.id);roles=[];nums=[];enemies=[];selMk=null;multiSel=multiSel.filter(id=>!mids.includes(id));if(typeof layerOrder!=='undefined')layerOrder=layerOrder.filter(id=>!mids.includes(id));layerGroupsArr.forEach(g=>g.members=g.members.filter(id=>!mids.includes(id)));cc.querySelectorAll('.pm,.pn,.pe').forEach(e=>e.remove());renderDr();renderLayers();schedSave()}
function clearAll(){$('confirmTitle').textContent='全クリア';$('confirmMsg').textContent='すべての描画・マーカー・範囲を削除しますか？';$('confirmOk').onclick=()=>{closeM('confirmM');doClearAll()};openM('confirmM')}
function doClearAll(){pushH();cc.querySelectorAll('.pm,.pn,.pe,.ah,.rh,.dh,.drawdel').forEach(e=>e.remove());selAoe=null;selDraw=null;selMk=null;roles=[];nums=[];enemies=[];aoes=[];drawings=[];layerGroupsArr=[];layerOrder=[];multiSel=[];layerCollapsedGroups={};drX.clearRect(0,0,CW,CH);aoX.clearRect(0,0,CW,CH);renderDr();renderLayers();schedSave();toast('全クリア')}
// MARKERS
function addDrag(el,m){el.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();if(tool==='select'){if(e.ctrlKey||e.metaKey){if(typeof multiSel==='undefined')multiSel=[];const mi=multiSel.indexOf(m.id);if(mi>=0)multiSel.splice(mi,1);else{if(selMk&&!multiSel.includes(selMk))multiSel.push(selMk);if(selDraw&&!multiSel.includes(selDraw))multiSel.push(selDraw);multiSel.push(m.id)}selMk=null;selDraw=null;applyMselDOM();renderLayers();return}if(multiSel.length>1&&multiSel.includes(m.id)){}else{deselAll();selMk=m.id;cc.querySelectorAll('.msel').forEach(x=>x.classList.remove('msel'));el.classList.add('msel');renderLayers()}}startDr(el,m,'mk',e.clientX,e.clientY)});el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();if(tool==='select'){if(multiSel.length>1&&multiSel.includes(m.id)){}else{deselAll();selMk=m.id;cc.querySelectorAll('.msel').forEach(x=>x.classList.remove('msel'));el.classList.add('msel')}}startDr(el,m,'mk',e.touches[0].clientX,e.touches[0].clientY)},{passive:false})}
function onDrop(e){e.preventDefault();let d;try{d=JSON.parse(e.dataTransfer.getData('text/plain'))}catch{return}const r=cc.getBoundingClientRect();if(d.t==='r'){pushH();const rt=RTYPES[d.i];if(rt){const n=roles.filter(m=>m.l.startsWith(rt.p)).length+1;const id=nid();roles.push({id,l:rt.p+n,c:rt.c,x:(e.clientX-r.left)/r.width*100,y:(e.clientY-r.top)/r.height*100});renderRole(roles[roles.length-1]);autoSelect()}}else if(d.t==='n'){pushH();addNum(d.n,(e.clientX-r.left)/r.width*100,(e.clientY-r.top)/r.height*100);autoSelect()}else if(d.t==='e'){epend={x:(e.clientX-r.left)/r.width*CW,y:(e.clientY-r.top)/r.height*CH};openM('enemyM');setTimeout(()=>{$('eI').focus();$('eI').select()},100);return}schedSave()}
function addRole(i,x,y){const r=RTYPES[i];if(!r)return;const n=roles.filter(m=>m.l.startsWith(r.p)).length+1;const id=nid();roles.push({id,l:r.p+n,c:r.c,x,y});renderRole(roles[roles.length-1]);autoSelect()}
function addNum(n,x,y){const ei=nums.findIndex(p=>p.l===n);if(ei>=0){const el=document.getElementById(nums[ei].id);if(el)el.remove();nums.splice(ei,1)}const id=nid();nums.push({id,l:n,x,y});renderNum(nums[nums.length-1]);autoSelect()}
function renderRole(m){if(m.hidden)return;const el=document.createElement('div');el.className='pm';el.id=m.id;el.textContent=m.l;el.style.background=m.c;el.style.left=m.x+'%';el.style.top=m.y+'%';el.style.width=roleSz+'px';el.style.height=roleSz+'px';el.style.fontSize=Math.max(8,roleSz/3)+'px';const d=document.createElement('button');d.className='xb';d.textContent='×';d.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();pushH();el.remove();roles=roles.filter(p=>p.id!==m.id);schedSave()});el.appendChild(d);addDrag(el,m);cc.appendChild(el);renderDr()}
function renderNum(m){if(m.hidden)return;const el=document.createElement('div');el.className='pn';el.id=m.id;el.textContent=m.l;el.style.left=m.x+'%';el.style.top=m.y+'%';el.style.width=numSz+'px';el.style.height=numSz+'px';el.style.fontSize=Math.max(10,numSz*.6)+'px';el.style.color=NUMCOL[m.l]||'#fff';const d=document.createElement('button');d.className='xb';d.textContent='×';d.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();pushH();el.remove();nums=nums.filter(p=>p.id!==m.id);schedSave()});el.appendChild(d);addDrag(el,m);cc.appendChild(el);renderDr()}
function buildRG(){const g=$('rG');g.innerHTML='';RTYPES.forEach((r,i)=>{const e=document.createElement('div');e.className='ms';e.textContent=r.p;e.style.background=r.c;e.draggable=true;e.addEventListener('dragstart',ev=>ev.dataTransfer.setData('text/plain',JSON.stringify({t:'r',i})));e.addEventListener('touchstart',ev=>{ev.preventDefault();pushH();addRole(i,50,50);schedSave()},{passive:false});g.appendChild(e)})}
function buildNG(){const g=$('nG');g.innerHTML='';for(let n=1;n<=6;n++){const e=document.createElement('div');e.className='ns';e.textContent=n;e.style.color=NUMCOL[n]||'#fff';e.draggable=true;e.addEventListener('dragstart',ev=>ev.dataTransfer.setData('text/plain',JSON.stringify({t:'n',n})));e.addEventListener('touchstart',ev=>{ev.preventDefault();pushH();addNum(n,50,50)},{passive:false});g.appendChild(e)}}
function buildCP(){const c=$('cPs');COLS.forEach((col,i)=>{const d=document.createElement('div');d.className='cpx'+(i===0?' a':'');d.style.background=col;d.dataset.c=col;d.onclick=()=>{dC=col;$('dCol').value=col;syncCP()};c.appendChild(d)})}
function syncCPNoUpdate(){document.querySelectorAll('.cpx').forEach(p=>p.classList.toggle('a',p.dataset.c===dC))}
function syncCP(){document.querySelectorAll('.cpx').forEach(p=>p.classList.toggle('a',p.dataset.c===dC));if(selDraw){const d=drawings.find(x=>x.id===selDraw);if(d){d.c=dC;renderDr();schedSave()}}}
// SAVE/LOAD
let svT=null;function schedSave(){if(typeof renderLayers==='function')renderLayers();clearTimeout(svT);svT=setTimeout(()=>{saveTab();try{localStorage.setItem('starezo_auto',JSON.stringify({tabs,curTab,mapSz}));$('svM').textContent='自動保存済';setTimeout(()=>$('svM').textContent='',2000)}catch{}},500)}
function getSaves(){try{return JSON.parse(localStorage.getItem('starezo_saves')||'[]')}catch{return[]}}
function setSaves(s){localStorage.setItem('starezo_saves',JSON.stringify(s))}
function getFullState(){saveTab();return JSON.stringify({v:6,tabs,curTab,mapSz})}
function openSaveM(){$('saveName').value='';renderSL();openM('saveM');setTimeout(()=>$('saveName').focus(),100)}
function renderSL(){const sl=$('saveList');sl.innerHTML='';getSaves().forEach((s,i)=>{const d=document.createElement('div');d.className='sitem';d.innerHTML=`<span class="sn">${s.name}</span><span class="st">${new Date(s.ts).toLocaleString('ja')}</span><span class="sd">🗑</span>`;d.querySelector('.sd').onclick=e=>{e.stopPropagation();const sv=getSaves();sv.splice(i,1);setSaves(sv);renderSL()};d.onclick=()=>{$('saveName').value=s.name};sl.appendChild(d)})}
function doSave(){const name=$('saveName').value.trim();if(!name){toast('名前を入力');return}const saves=getSaves(),ex=saves.findIndex(s=>s.name===name);const entry={name,ts:Date.now(),data:getFullState()};if(ex>=0)saves[ex]=entry;else saves.push(entry);setSaves(saves);toast('保存: '+name);renderSL()}
function openLoadM(){const ll=$('loadList');ll.innerHTML='';getSaves().forEach((s,i)=>{const d=document.createElement('div');d.className='sitem';d.innerHTML=`<span class="sn">${s.name}</span><span class="st">${new Date(s.ts).toLocaleString('ja')}</span><span class="sd">🗑</span>`;d.querySelector('.sd').onclick=e=>{e.stopPropagation();const sv=getSaves();sv.splice(i,1);setSaves(sv);openLoadM()};d.onclick=()=>{try{applyFull(JSON.parse(s.data));closeM('loadM');toast('ロード: '+s.name)}catch{toast('失敗')}};ll.appendChild(d)});if(!getSaves().length)ll.innerHTML='<div style="color:var(--tx3);font-size:11px;padding:8px">セーブデータなし</div>';openM('loadM')}
function openShareM(){$('shareD').value=getFullState();openM('shareM')}
function openImportM(){$('importD').value='';openM('importM');setTimeout(()=>$('importD').focus(),100)}
function doImport(){const r=$('importD').value.trim();if(!r)return;try{applyFull(JSON.parse(r));closeM('importM');toast('読込完了')}catch{toast('データエラー')}}
function applyFull(s){if(!s.tabs){// Legacy single-tab
tabs=[{id:'t0',name:'Tab 1',data:s}];curTab='t0';if(s.mapSz)mapSz=s.mapSz;$('mS').value=mapSz;$('msV').textContent=mapSz;loadTab('t0');return}
tabs=s.tabs;curTab=null;if(s.mapSz){mapSz=s.mapSz;$('mS').value=mapSz;$('msV').textContent=mapSz}loadTab(s.curTab||tabs[0].id)}
function loadHash(){if(!location.hash||location.hash.length<2)return;try{applyFull(JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(1))))));toast('共有データロード')}catch{}}
// IMAGE EXPORT
function exportImg(){saveTab();tabs.forEach((t,i)=>{const d=t.data;if(!d)return;
// Temporarily set state for this tab
const oF=field,oGC=gridC,oGR=gridR,oSG=showGrid,oSN=showN;
field=d.field||'circle';gridC=d.gridC||3;gridR=d.gridR||3;showGrid=d.showGrid!==false;showN=!!d.showN;
calcSz();drawBg();
const cv=document.createElement('canvas');cv.width=CW;cv.height=CH;const cx=cv.getContext('2d');
cx.drawImage(bgCv,0,0);
// Draw AoEs
const M2=Math.max(CW,CH);(d.aoes||[]).forEach(a=>{if(a.sh==='c'){drawAoES(cx,'c',a.at,{x:a.cx/100*CW,y:a.cy/100*CH},{x:a.cx/100*CW+a.r/100*M2,y:a.cy/100*CH},0)}else{drawAoES(cx,'l',a.at,{x:a.x1/100*CW,y:a.y1/100*CH},{x:a.x2/100*CW,y:a.y2/100*CH},a.w/100*M2)}});
// Draw drawings
(d.drawings||[]).forEach(dd=>drawObj(cx,dd));
// Draw markers
const rs=d.roleSz||30,es=d.enemySz||40,ns=d.numSz||26;
(d.roles||[]).forEach(m=>{const px=m.x/100*CW,py=m.y/100*CH;cx.fillStyle=m.c;cx.beginPath();cx.arc(px,py,rs/2,0,Math.PI*2);cx.fill();cx.strokeStyle='rgba(255,255,255,.5)';cx.lineWidth=2;cx.stroke();cx.fillStyle='#fff';cx.font=`bold ${Math.max(8,rs/3)}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';cx.fillText(m.l,px,py+rs*0.08)});
(d.enemies||[]).forEach(m=>{const px=m.x/100*CW,py=m.y/100*CH;cx.fillStyle=m.c||'rgba(140,20,50,.85)';cx.beginPath();cx.arc(px,py,es/2,0,Math.PI*2);cx.fill();cx.strokeStyle='rgba(255,100,100,.6)';cx.lineWidth=2;cx.stroke();cx.fillStyle='#fff';cx.font=`bold ${Math.max(8,es/4)}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';cx.fillText(m.l,px,py)});
(d.nums||[]).forEach(m=>{const px=m.x/100*CW,py=m.y/100*CH;cx.fillStyle='rgba(255,255,255,.12)';const hs=ns/2;cx.fillRect(px-hs,py-hs,ns,ns);cx.strokeStyle='rgba(255,255,255,.2)';cx.lineWidth=2;cx.strokeRect(px-hs,py-hs,ns,ns);cx.fillStyle='#e6edf3';cx.font=`bold ${Math.max(8,ns/2)}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';cx.fillText(m.l,px,py)});
setTimeout(()=>{const a=document.createElement('a');a.download=(t.name||'tab'+(i+1))+'.png';a.href=cv.toDataURL('image/png');a.click()},i*300);
// Restore
field=oF;gridC=oGC;gridR=oGR;showGrid=oSG;showN=oSN});
// Restore current
calcSz();drawBg();renderDr();renderAoE();
toast(tabs.length>1?tabs.length+'枚の画像を保存':'画像保存')}
function openM(id){$(id).classList.add('show')}
function closeM(id){$(id).classList.remove('show')}
function toast(m){const t=$('tst');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}
// INIT
function init(){buildRG();buildNG();buildCP();setupEnemyDrag();calcSz();drawBg();setupEv();
try{const s=JSON.parse(localStorage.getItem('starezo_auto'));if(s&&s.tabs){applyFull(s);return}}catch(e){console.warn('auto-load failed',e)}
loadTab(tabs[0].id);loadHash()}
init();setTimeout(fitCanvas,100);window.addEventListener('resize',fitCanvas);
</script></body></html>
